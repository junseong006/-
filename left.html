    <!-- hw.html 파일 내부 수정 예시 -->
<style>
    body {
        background-color: #ffffff !important; /* 배경을 무조건 흰색으로 */
        color: #222222 !important;            /* 기본 글자색을 진한 회색/검은색으로 */
        margin: 15px;                         /* 여백을 주면 더 깔끔해 보입니다 */
    }

    /* 🔴 중요: 과제 내부에 들어가는 모든 글자색을 어둡게 보정합니다 */
    h1, h2, h3, h4, p, span, div, li {
        color: #222222 !important;
    }

    /* 만약 과제에 테이블(표)이 있다면 표 내부도 밝게 보정 */
    table {
        border-collapse: collapse;
        width: 100%;
        color: #222222;
    }
    th {
        background-color: #f5f5f5; /* 표 헤더는 연한 회색 */
        border: 1px solid #dddddd;
    }
    td {
        border: 1px solid #dddddd;
        background-color: #ffffff;
    }
</style>
