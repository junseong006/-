<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Green-Map</title>
    <style>
        body { background-color: #333; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .signup-container { width: 400px; padding: 30px; background: #222; border: 2px solid goldenrod; border-radius: 15px; }
        h2 { color: goldenrod; text-align: center; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: goldenrod; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; color: #222; }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>CREATE ACCOUNT</h2>
        <form id="signupForm">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" id="userId" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" id="userPw" required placeholder="영문,숫자,특수기호 포함 9자 이상">
            </div>
            <div class="form-group">
                <label>비밀번호 확인</label>
                <input type="password" id="userPwConfirm" required>
            </div>
            <button type="submit">가입하기</button>
        </form>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const pw = document.getElementById('userPw').value;
            const pwRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{9,}$/;
            if (!pwRegex.test(pw)) { alert('비밀번호 형식이 올바르지 않습니다.'); return; }
            if (pw !== document.getElementById('userPwConfirm').value) { alert('비밀번호 불일치'); return; }
            localStorage.setItem('savedId', id);
            localStorage.setItem('savedPw', pw);
            alert('가입 완료!');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
