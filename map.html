    <title>Map</title>
    <style>
        .swirl-particle, .gold-dust {
            pointer-events: none !important;
        }

        .swirl-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            opacity: 1;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease-out;
        }

        .gold-dust {
            position: absolute;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            animation: goldBurst 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes goldBurst {
            0% {
                transform: translate(-50%, -50%) translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) translate(var(--tx), calc(var(--ty) + 15px)) rotate(var(--rot)) scale(0.3);
                opacity: 0;
            }
        }

        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .button-group { margin-bottom: 20px; }
        
        #districtBox { margin-bottom: 20px; }
        .active { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        
        .sub-button-group {
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            display: none;
        }
        .sub-button-group button {
            background: #fff;
            border-color: #bbb;
            font-size: 13px;
        }
        .sub-button-group button:hover {
            background: #ebeeef;
        }
        button { padding: 8px 15px; margin-right: 5px; margin-bottom: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: white; }
        button:hover { background: #e0e0e0; }
        
        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            font-size: 16px;
            border: 2px solid goldenrod;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }
        
        .store-item { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #2ecc71; }
        .store-name { display: block; font-weight: bold; font-size: 16px; color: #333; }
        .store-addr { display: block; color: #666; font-size: 14px; margin-top: 5px; }
    </style>
</head>

        window.onload = function() {
            showStores('all');
        };

        function selectRegion(regionName, btn) {
            document.querySelectorAll('.button-group button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            const seoulGroup = document.getElementById('seoul-gu-group');
            const districtBox = document.getElementById('districtBox');
            
            seoulGroup.style.display = 'none';
            districtBox.innerHTML = '';
            
            if (regionName === 'all') {
                showStores('all');
            } else if (regionName === '서울') {
                seoulGroup.style.display = 'block';
                document.querySelectorAll('#seoul-gu-group button').forEach(b => b.classList.remove('active'));
                document.querySelector('#seoul-gu-group button').classList.add('active');
                showStores('서울');
            } else {
                const districts = new Set();
                storeData.forEach(store => {
                    if (store.지번주소.startsWith(regionName)) {
                        const parts = store.지번주소.split(' ');
                        if (parts[1]) districts.add(parts[1]);
                    }
                });

                if(districts.size > 0) {
                    Array.from(districts).sort().forEach(dist => {
                        const subBtn = document.createElement('button');
                        subBtn.className = 'btn';
                        subBtn.innerText = dist;
                        subBtn.onclick = function() { 
                            document.querySelectorAll('#districtBox .btn').forEach(b => b.classList.remove('active'));
                            subBtn.classList.add('active');
                            showStores(dist); 
                        };
                        districtBox.appendChild(subBtn);
                    });
                }
                showStores(regionName);
            }
        }

        function filterGu(guName, btn) {
            document.querySelectorAll('#seoul-gu-group button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            if (guName === 'all') {
                showStores('서울');
            } else {
                showStores(guName);
            }
        }

        function searchStore() {
            const keyword = document.getElementById('search-input').value.toLowerCase().trim();
            const storeListBox = document.getElementById('storeListBox');
            storeListBox.innerHTML = '';

            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));

            const filtered = storeData.filter(store => 
                store.상호명.toLowerCase().includes(keyword) || store.지번주소.toLowerCase().includes(keyword)
            );

            renderList(filtered);
        }

        function showStores(filterName) {
            const storeListBox = document.getElementById('storeListBox');
            storeListBox.innerHTML = '';

            let filtered = [];
            if (filterName === 'all') {
                filtered = storeData;
            } else {
                filtered = storeData.filter(store => store.지번주소.includes(filterName));
            }

            renderList(filtered);
        }

        function renderList(list) {
            const storeListBox = document.getElementById('storeListBox');
            if (list.length === 0) {
                storeListBox.innerHTML = `<p style="text-align:center; color:#666; padding: 20px 0;">등록된 식당이 없습니다.</p>`;
                return;
            }

            list.forEach(store => {
                const item = document.createElement('div');
                item.className = 'store-item';
                item.innerHTML = `
                    <span class="store-name">${store.상호명}</span>
                    <span class="store-addr">${store.지번주소}</span>
                `;
                storeListBox.appendChild(item);
            });
        }
         
        window.addEventListener('click', function(e) {
            if (e.target.tagName === 'INPUT') return;

            const mouseX = e.pageX;
            const mouseY = e.pageY;

            const blackCount = 14;
            const blackColors = ['#000000', '#1a1a1a', '#333333', '#555555'];

            for (let i = 0; i < blackCount; i++) {
                const blackPart = document.createElement('div');
                blackPart.className = 'swirl-particle';
                blackPart.style.pointerEvents = 'none'; 
                blackPart.style.background = blackColors[Math.floor(Math.random() * blackColors.length)];

                const size = Math.random() * 2 + 2; 
                blackPart.style.width = size + 'px';
                blackPart.style.height = size + 'px';
                blackPart.style.left = mouseX + 'px';
                blackPart.style.top = mouseY + 'px';
                document.body.appendChild(blackPart);

                const startAngle = (i / blackCount) * Math.PI * 2; 
                const targetRadius = Math.random() * 35 + 35; 
                const swirlRotation = 540; 

                const endAngle = startAngle + (swirlRotation * Math.PI / 180);
                const targetX = Math.cos(endAngle) * targetRadius;
                const targetY = Math.sin(endAngle) * targetRadius;

                requestAnimationFrame(() => {
                    blackPart.style.transform = `translate(-50%, -50%) translate(${targetX}px, ${targetY}px) rotate(${swirlRotation}deg)`;
                    blackPart.style.opacity = '0'; 
                });

                setTimeout(() => { blackPart.remove(); }, 800);
            }

            const rainbowCount = 15;
            const rainbowColors = ['#ff2a2a', '#ff7a2a', '#ffea2a', '#2aff4b', '#2affdb', '#2a76ff', '#b62aff', '#ff2a9d'];

            for (let j = 0; j < rainbowCount; j++) {
                const colorPart = document.createElement('div');
                colorPart.className = 'gold-dust'; 
                colorPart.style.pointerEvents = 'none'; 
                
                const randomColor = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                colorPart.style.background = randomColor;
                colorPart.style.boxShadow = `0 0 3px ${randomColor}, 0 0 6px ${randomColor}`;

                const partSize = Math.random() * 1.5 + 1.5; 
                colorPart.style.width = partSize + 'px';
                colorPart.style.height = partSize + 'px';
                colorPart.style.left = mouseX + 'px';
                colorPart.style.top = mouseY + 'px';

                const goldAngle = Math.random() * Math.PI * 2;
                const goldDistance = Math.random() * 70 + 25; 
                
                const goldX = Math.cos(goldAngle) * goldDistance;
                const goldY = Math.sin(goldAngle) * goldDistance;
                const goldRot = Math.random() * 360; 

                colorPart.style.setProperty('--tx', goldX + 'px');
                colorPart.style.setProperty('--ty', goldY + 'px');
                colorPart.style.setProperty('--rot', goldRot + 'deg');

                document.body.appendChild(colorPart);

                setTimeout(() => { colorPart.remove(); }, 500);
            }
        });
    </script>
